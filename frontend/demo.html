<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathGuide — 拍照搜题 · 个性化引导</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --success: #4ade80; --warn: #fbbf24; --error: #f87171;
    --primary: #818cf8; --secondary: #c084fc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
  @media (max-width: 768px) { .app { grid-template-columns: 1fr; } .right { display: none; } .app.chat-open .left { display: none; } .app.chat-open .right { display: flex; } }

  .left { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .header { padding: 24px 20px 16px; }
  .header h1 { font-size: 22px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .field { padding: 0 20px 10px; }
  .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-size: 13px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

  .upload { margin: 8px 20px; border: 2px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: .2s; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .upload:hover { border-color: var(--accent); background: rgba(56,189,248,.04); }
  .upload.has-img { border-style: solid; border-color: var(--success); padding: 8px; }
  .upload input { display: none; }
  .upload .icon { font-size: 32px; margin-bottom: 6px; }
  .upload .txt { font-size: 12px; color: var(--muted); }
  .upload img { max-width: 100%; max-height: 100px; border-radius: 8px; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; }
  .btn-go { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; width: 100%; }
  .btn-go:hover { opacity: .9; transform: translateY(-1px); }
  .btn-go:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-reset { background: var(--border); color: var(--text); width: 100%; margin-top: 8px; }
  .btn-area { padding: 0 20px 12px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 20px 10px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(192,132,252,.2); color: var(--secondary); }
  .progress-wrap { margin: 0 20px 8px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 2px; transition: width .3s; width: 0%; }
  .progress-label { font-size: 10px; color: var(--muted); margin-top: 2px; text-align: right; }

  /* Chat */
  .right { display: flex; flex-direction: column; overflow: hidden; }
  .chat-top { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .dot.off { background: var(--muted); }
  .chat-top .info { font-size: 11px; color: var(--muted); margin-left: auto; }

  .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.65; animation: in .25s ease; }
  @keyframes in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.tutor { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg.me { align-self: flex-end; background: rgba(129,140,248,.18); border: 1px solid rgba(129,140,248,.25); }
  .msg.hint { align-self: flex-start; background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.25); border-left: 3px solid var(--warn); }
  .msg.reveal { align-self: flex-start; background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.25); border-left: 3px solid var(--success); }
  .msg .tag-line { font-size: 10px; color: var(--muted); margin-bottom: 2px; letter-spacing: .5px; }

  .chat-input { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .chat-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; }
  .chat-input input:focus { outline: none; border-color: var(--accent); }
  .chat-input button { padding: 10px 20px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; transition: .2s; }
  .chat-input button:hover { opacity: .85; }
  .chat-input button:disabled { opacity: .35; cursor: not-allowed; }

  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; }
  .empty .big { font-size: 42px; }
  .empty p { font-size: 13px; }

  .error-bar { margin: 8px 20px; padding: 10px 14px; background: rgba(248,113,113,.15); border: 1px solid rgba(248,113,113,.3); border-radius: 8px; font-size: 12px; color: var(--error); display: none; }
</style>
</head>
<body>
<div class="app" id="appRoot">
  <div class="left">
    <div class="header">
      <h1>MathGuide</h1>
      <div class="sub">拍照搜题 · 苏格拉底式引导 · 6-Agent</div>
    </div>

    <div class="field">
      <label>学生 ID</label>
      <input id="learnerId" value="小明" placeholder="输入学生ID">
    </div>
    <div class="field">
      <label>年级</label>
      <select id="grade">
        <option>初一</option><option>初二</option><option selected>初三</option>
        <option>高一</option><option>高二</option><option>高三</option>
      </select>
    </div>

    <div class="upload" id="uploadZone" onclick="document.getElementById('imgInput').click()">
      <input type="file" id="imgInput" accept="image/jpeg,image/png" onchange="pickFile(event)">
      <div id="uploadHint">
        <div class="icon">📷</div>
        <div class="txt">点击上传数学题照片<br><span style="font-size:10px">支持 JPG / PNG</span></div>
      </div>
      <img id="preview" style="display:none">
    </div>

    <div class="error-bar" id="errorBar"></div>

    <div class="tags" id="kpTags"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
      <div class="progress-label" id="pLabel"></div>
    </div>

    <div class="btn-area">
      <button class="btn btn-go" id="goBtn" onclick="start()" disabled>开始引导</button>
      <button class="btn btn-reset" onclick="reset()">重新开始</button>
    </div>
  </div>

  <div class="right">
    <div class="chat-top">
      <div class="dot off" id="dot"></div>
      <span style="font-size:13px;font-weight:600">引导对话</span>
      <span class="info" id="sessInfo"></span>
    </div>
    <div class="messages" id="msgs">
      <div class="empty"><div class="big">📐</div><p>上传数学题照片开始</p><p style="font-size:11px">AI 会用提问引导你思考，而不是直接给答案</p></div>
    </div>
    <div class="chat-input">
      <input id="replyInput" placeholder="输入你的回答…" disabled onkeydown="if(event.key==='Enter')send()">
      <button id="sendBtn" onclick="send()" disabled>发送</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
let sid = null, curStep = 0, totalSteps = 0, file = null;

function pickFile(e) {
  file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('uploadHint').style.display = 'none';
    const p = document.getElementById('preview');
    p.src = ev.target.result; p.style.display = 'block';
    document.getElementById('uploadZone').classList.add('has-img');
    document.getElementById('goBtn').disabled = false;
    hideError();
  };
  r.readAsDataURL(file);
}

async function start() {
  if (!file) return;
  const btn = document.getElementById('goBtn');
  btn.disabled = true; btn.textContent = '识别中…';
  document.getElementById('dot').classList.remove('off');
  hideError();

  const fd = new FormData();
  fd.append('image', file);
  fd.append('learner_id', document.getElementById('learnerId').value || '小明');

  try {
    const r = await fetch(`${API}/photo-solve`, { method: 'POST', body: fd });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${r.status}`); }

    const d = await r.json();
    sid = d.session_id;
    totalSteps = (d.knowledge_points || []).length || 2;
    curStep = 0;

    document.getElementById('kpTags').innerHTML = (d.knowledge_points||[]).map(k => `<span class="tag">${k}</span>`).join('');
    updateProgress();

    document.getElementById('msgs').innerHTML = '';
    addMsg('tutor', '', '📝 ' + d.problem_text);
    addMsg('tutor', '导师', d.first_guidance);

    document.getElementById('sessInfo').textContent = sid.slice(0, 12) + '…';
    document.getElementById('replyInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('replyInput').focus();
    btn.textContent = '引导中…';

  } catch (e) {
    showError(e.message);
    btn.disabled = false; btn.textContent = '重试';
    document.getElementById('dot').classList.add('off');
  }
}

async function send() {
  const inp = document.getElementById('replyInput');
  const txt = inp.value.trim();
  if (!txt || !sid) return;
  inp.value = ''; inp.disabled = true;
  document.getElementById('sendBtn').disabled = true;
  addMsg('me', '', txt);

  try {
    const r = await fetch(`${API}/photo-session/${sid}/reply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ learner_id: document.getElementById('learnerId').value, reply: txt })
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${r.status}`); }

    const d = await r.json();
    if (d.action === 'praise' || d.action === 'summarize') { curStep++; updateProgress(); }

    const cls = d.action === 'hint' ? 'hint' : d.action === 'reveal' ? 'reveal' : 'tutor';
    const pre = d.hint_level ? `💡 L${d.hint_level} ` : '';
    addMsg(cls, d.hint_level ? '提示' : (d.action === 'reveal' ? '答案揭示' : '导师'), pre + d.message);

    if (d.action === 'summarize') {
      sid = null;
      inp.disabled = true; document.getElementById('sendBtn').disabled = true;
      document.getElementById('goBtn').textContent = '再来一题';
      document.getElementById('goBtn').disabled = false;
      document.getElementById('dot').classList.add('off');
    } else {
      inp.disabled = false; document.getElementById('sendBtn').disabled = false;
      inp.focus();
    }
  } catch (e) {
    addMsg('tutor', '错误', '❌ ' + e.message);
    inp.disabled = false; document.getElementById('sendBtn').disabled = false;
  }
}

function addMsg(cls, tag, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = (tag ? `<div class="tag-line">${tag}</div>` : '') + text.replace(/\n/g, '<br>');
  document.getElementById('msgs').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function updateProgress() {
  const pct = totalSteps > 0 ? Math.min(100, Math.round(curStep / totalSteps * 100)) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = `${curStep}/${totalSteps} 步骤`;
}

function showError(msg) { const e = document.getElementById('errorBar'); e.textContent = '⚠ ' + msg; e.style.display = 'block'; }
function hideError() { document.getElementById('errorBar').style.display = 'none'; }

function reset() {
  sid = null; curStep = 0; totalSteps = 0; file = null;
  document.getElementById('msgs').innerHTML = '<div class="empty"><div class="big">📐</div><p>上传数学题照片开始</p><p style="font-size:11px">AI 会用提问引导你思考，而不是直接给答案</p></div>';
  document.getElementById('kpTags').innerHTML = '';
  document.getElementById('pFill').style.width = '0%';
  document.getElementById('pLabel').textContent = '';
  document.getElementById('sessInfo').textContent = '';
  document.getElementById('replyInput').disabled = true; document.getElementById('replyInput').value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('goBtn').disabled = true; document.getElementById('goBtn').textContent = '开始引导';
  document.getElementById('dot').classList.add('off');
  document.getElementById('uploadHint').style.display = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('uploadZone').classList.remove('has-img');
  hideError();
}
</script>
</body>
</html>
